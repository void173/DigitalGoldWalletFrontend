<!DOCTYPE html>
<html>
<head>
    <title>Vendor Branches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/branches.css">
</head>

<body onload="init()">
<div class="container">

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">← Back to Vendors</button>

    <!-- Title — subtitle filled dynamically -->
    <h2>Vendor Branches</h2>
    <p class="subtitle" id="pageSubtitle"></p>

    <!-- Vendor Stats Card — all three values filled dynamically -->
    <div class="card vendor-card">
        <div class="vendor-stat">
            <div class="stat-label">Vendor Name</div>
            <div class="stat-value" id="vendorName"></div>
        </div>
        <div class="vendor-stat">
            <div class="stat-label">Current Gold Price</div>
            <div class="stat-value gold" id="goldPrice"></div>
        </div>
        <div class="vendor-stat">
            <div class="stat-label">Total Gold Quantity</div>
            <div class="stat-value gold" id="totalQty"></div>
        </div>
    </div>

    <!-- Filters Card — dropdown options populated dynamically -->
    <div class="card filter-card">
        <div class="filter-title">Filter Branches</div>
        <div class="filter-row">
            <div class="filter-group">
                <label>City</label>
                <select id="city">
                    <option value="">All Cities</option>
                </select>
            </div>
            <div class="filter-group">
                <label>State</label>
                <select id="state">
                    <option value="">All States</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Country</label>
                <select id="country">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="apply-btn" onclick="applyFilters()">Apply</button>
                <button class="reset-btn" onclick="resetFilters()">Reset</button>
            </div>
        </div>
    </div>

    <!-- Table Card — rows filled dynamically by branches.js -->
    <div class="card table-card">
        <table id="branchTable">
            <thead>
            <tr>
                <th>Street</th>
                <th>City</th>
                <th>State</th>
                <th>Country</th>
                <th>Postal Code</th>
                <th>Gold Qty (oz)</th>
            </tr>
            </thead>
            <tbody id="branchTableBody">
            <!-- Populated by branches.js -->
            </tbody>
        </table>
        <div id="emptyState" class="empty-state hidden">No branches found.</div>
    </div>

</div>
<script src="../js/branches.js"></script>
</body>
</html>
